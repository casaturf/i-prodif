{% extends 'base.html' %}
{% block content %}
<div style="max-width:480px;margin:60px auto;padding:0 16px">
  <h2>Nouveau mot de passe</h2>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div style="margin-bottom:16px">
      <label>Nouveau mot de passe</label>
      <input type="password" name="password" required minlength="6"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-top:4px">
    </div>
    <div style="margin-bottom:16px">
      <label>Confirmer le mot de passe</label>
      <input type="password" name="password2" required minlength="6"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-top:4px">
    </div>
    <button type="submit"
      style="background:#279FF5;color:white;padding:12px 24px;border:none;border-radius:6px;cursor:pointer;width:100%">
      Modifier le mot de passe
    </button>
  </form>
</div>
{% endblock %}
