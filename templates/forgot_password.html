{% extends 'base.html' %}
{% block content %}
<div style="max-width:480px;margin:60px auto;padding:0 16px">
  <h2>Mot de passe oublie</h2>
  <p>Entrez votre email et nous vous enverrons un lien de reinitialisation.</p>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div style="margin-bottom:16px">
      <label>Email</label>
      <input type="email" name="email" required
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-top:4px">
    </div>
    <button type="submit"
      style="background:#279FF5;color:white;padding:12px 24px;border:none;border-radius:6px;cursor:pointer;width:100%">
      Envoyer le lien
    </button>
  </form>
  <p style="margin-top:16px"><a href="{{ url_for('login') }}">Retour a la connexion</a></p>
</div>
{% endblock %}
